# Nome do workflow exibido na aba "Actions" do GitHub
name: Build and deploy Python app to Vercel

# Define os gatilhos que disparam este workflow automaticamente
on:
  # Executa o workflow sempre que houver um push na branch "main"
  push:
    branches:
      - main
  # Permite executar o workflow manualmente pela interface do GitHub Actions
  workflow_dispatch:

# Define os jobs (etapas principais) do pipeline
jobs:

  # -------------------------------------------------------
  # JOB 1: build — responsável por instalar e validar o app
  # -------------------------------------------------------
  build:
    # Usa uma máquina virtual com Ubuntu (Linux) para executar os passos
    runs-on: ubuntu-latest

    # Permissões necessárias para este job
    permissions:
      contents: read # Permite apenas leitura do conteúdo do repositório

    steps:
      # Passo 1: Imprime uma mensagem no console antes de iniciar o build
      - name: Iniciando pipeline
        run: echo "Iniciando o deploy do meu projeto!"

      # Passo 2: Faz o checkout do código do repositório para a máquina virtual
      - uses: actions/checkout@v6

      # Passo 3: Configura a versão do Python a ser usada no ambiente de build
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Versão do Python utilizada no projeto

      # Passo 4: Cria e ativa um ambiente virtual Python isolado para as dependências
      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      # Passo 5: Instala todas as dependências listadas no arquivo requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

  # -------------------------------------------------------
  # JOB 2: deploy — responsável por publicar o app na Vercel
  # -------------------------------------------------------
  deploy:
    # Usa uma máquina virtual com Ubuntu (Linux) para executar os passos
    runs-on: ubuntu-latest

    # Este job só executa após o job "build" ser concluído com sucesso
    needs: build

    # Define o ambiente de deploy como "Production"
    environment:
      name: 'Production'

    # Permissões necessárias para este job
    permissions:
      contents: read # Permite leitura do conteúdo do repositório

    steps:
      # Passo 1: Faz o checkout do código para a máquina virtual do job de deploy
      - name: Checkout repository
        uses: actions/checkout@v6

      # Passo 2: Instala o Vercel CLI globalmente via npm para realizar o deploy
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Passo 3: Faz o deploy do projeto para a Vercel em produção
      # As variáveis de ambiente (secrets) são configuradas no repositório GitHub:
      # VERCEL_TOKEN      — token de autenticação da conta Vercel
      # VERCEL_ORG_ID     — ID da organização/conta na Vercel
      # VERCEL_PROJECT_ID — ID do projeto criado na Vercel
      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}         # ID da organização na Vercel
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # ID do projeto na Vercel
